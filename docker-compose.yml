version: '3'

services:

  # Nginx Web Server
  nginx:
    image: nginx:latest
    container_name: lamp_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./proyecto/src:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./certs:/etc/nginx/certs
    depends_on:
      - php
    networks:
      - lamp-network

  # PHP-FPM
  php:
    build:
      context: .
      dockerfile: Dockerfile.php
    container_name: lamp_php
    volumes:
      - ./proyecto/src:/var/www/html
    depends_on:
      - db
    networks:
      - lamp-network

        # phpMyAdmin - Interfaz visual para MySQL
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: lamp_phpmyadmin
    environment:
      PMA_HOST: lamp_db
      PMA_USER: ougalde
      PMA_PASSWORD: 37863
    ports:
      - "8080:80"
    depends_on:
      - db
    networks:
      - lamp-network


  # MySQL Database
  db:
    image: mysql:8.4
    container_name: lamp_db
    command: --mysql-native-password=ON
    environment:
      MYSQL_ROOT_PASSWORD: 37863
      MYSQL_DATABASE: arqweb
      MYSQL_USER: ougalde
      MYSQL_PASSWORD: 37863
    volumes:
      - ./db/tareas_db.sql:/docker-entrypoint-initdb.d/01_tareas_db.sql:ro
      - dbdataP26:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - lamp-network

# Networks
networks:
  lamp-network:
    driver: bridge

# Volumes
volumes:
  dbdataP26:

