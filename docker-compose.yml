version: '3'

services:
  # Nginx Web Server with SSL
  nginx:
    image: nginx:latest
    container_name: lamp_nginx
    ports:
      - "80:80"    # HTTP
      - "443:443"  # HTTPS
    volumes:
      - ./src:/var/www/html          # Web files
      - ./nginx.conf:/etc/nginx/conf.d/default.conf  # Nginx configuration
      - ./certs:/etc/nginx/certs      # SSL certificates
    depends_on:
      - php
    networks:
      - lamp-network

  # PHP-FPM
  php:
    #image: php:8.5.2-fpm
    build:
      context: .
      dockerfile: Dockerfile.php
    container_name: lamp_php
    volumes:
      - ./src:/var/www/html
    depends_on:
      - db
    networks:
      - lamp-network

  # MySQL Database
  db:
    image: mysql:8.4
    container_name: lamp_db
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: 37863
      MYSQL_DATABASE: arqweb
      MYSQL_USER: ougalde
      MYSQL_PASSWORD: 37863
    volumes:
      - ./db:/root
      - dbdataP26:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - lamp-network

# Networks
networks:
  lamp-network:
    driver: bridge

# Volumes
volumes:
  dbdataP26: